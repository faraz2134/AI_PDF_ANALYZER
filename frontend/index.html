<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PDF Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
.chat-box::-webkit-scrollbar{width:6px}
.chat-box::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:6px}
</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-6xl h-[90vh] bg-white rounded-2xl shadow-xl overflow-hidden flex">

<!-- Sidebar -->
<div class="w-80 bg-slate-900 text-white p-6 flex flex-col justify-between">

<div>
<h1 class="text-3xl font-bold text-blue-400">AI PDF Analyzer</h1>
<p class="text-slate-400 text-sm mt-2">
Upload a PDF and ask questions using Gemini AI.
</p>

<div class="mt-8 border-2 border-dashed border-slate-700 rounded-xl p-6 text-center relative hover:border-blue-500 transition">

<input id="pdfFile"
type="file"
accept=".pdf"
class="absolute inset-0 opacity-0 cursor-pointer"
onchange="uploadPDF()">

<div class="text-5xl">📄</div>

<p id="uploadStatus" class="mt-4 text-sm">
Click to upload PDF
</p>

<p class="text-xs text-slate-500 mt-2">
PDF only
</p>

</div>

<button
onclick="newChat()"
class="w-full mt-6 bg-red-600 hover:bg-red-700 rounded-xl py-3 font-semibold">
🗑 New Chat
</button>

</div>

<div>
<span id="statusBadge"
class="inline-block bg-blue-800 px-3 py-2 rounded-lg text-xs">
Status : Idle
</span>
</div>

</div>

<!-- Chat -->
<div class="flex-1 flex flex-col">

<div id="chatBox"
class="flex-1 overflow-y-auto chat-box p-6 bg-slate-50 space-y-4">

<div class="flex gap-3">
<div class="bg-blue-600 text-white p-2 rounded-lg">🤖</div>
<div class="bg-white shadow rounded-xl p-4 max-w-xl">
Hello! Upload a PDF and start asking questions.
</div>
</div>

</div>

<div class="border-t bg-white p-4 flex gap-3">

<input
id="queryInput"
disabled
onkeydown="if(event.key==='Enter') askQuestion()"
placeholder="Ask about your PDF..."
class="flex-1 border rounded-xl px-4 py-3 outline-none">

<button
id="sendBtn"
disabled
onclick="askQuestion()"
class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white px-6 rounded-xl">
Send
</button>

</div>

</div>

</div>

<script>

const API_URL="https://ai-pdf-analyzer-rq4o.onrender.com";

function botMessage(text){
const chat=document.getElementById("chatBox");
chat.innerHTML+=`
<div class="flex gap-3">
<div class="bg-blue-600 text-white p-2 rounded-lg">🤖</div>
<div class="bg-white shadow rounded-xl p-4 max-w-xl whitespace-pre-wrap">${text}</div>
</div>`;
chat.scrollTop=chat.scrollHeight;
}

function userMessage(text){
const chat=document.getElementById("chatBox");
chat.innerHTML+=`
<div class="flex justify-end gap-3">
<div class="bg-blue-600 text-white rounded-xl p-4 max-w-xl">${text}</div>
<div class="bg-slate-300 rounded-lg p-2">👤</div>
</div>`;
chat.scrollTop=chat.scrollHeight;
}

function resetUpload(){
document.getElementById("uploadStatus").innerText="Click to upload PDF";
document.getElementById("statusBadge").innerText="Status : Idle";
document.getElementById("queryInput").disabled=true;
document.getElementById("sendBtn").disabled=true;
document.getElementById("pdfFile").value="";
}

async function uploadPDF(){

const file=document.getElementById("pdfFile").files[0];
if(!file)return;

const fd=new FormData();
fd.append("file",file);

document.getElementById("uploadStatus").innerText="Uploading...";
document.getElementById("statusBadge").innerText="Status : Processing";

try{

const res=await fetch(`${API_URL}/upload`,{
method:"POST",
body:fd
});

const data=await res.json();

if(!res.ok){
alert(data.detail);
resetUpload();
return;
}

document.getElementById("uploadStatus").innerText=file.name;
document.getElementById("statusBadge").innerText="Status : Ready";
document.getElementById("queryInput").disabled=false;
document.getElementById("sendBtn").disabled=false;

botMessage("PDF uploaded successfully. Ask me anything about it.");

}catch(e){
alert("Backend unavailable.");
resetUpload();
}

}

async function askQuestion(){

const input=document.getElementById("queryInput");
const q=input.value.trim();

if(!q)return;

userMessage(q);
input.value="";

botMessage("Thinking...");

const chat=document.getElementById("chatBox");
const loading=chat.lastElementChild;

try{

const res=await fetch(`${API_URL}/ask`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:q
})
});

const data=await res.json();

loading.remove();

botMessage(data.answer);

}catch(e){

loading.remove();
botMessage("Unable to generate an answer.");

}

}

async function newChat(){

try{
await fetch(`${API_URL}/new-chat`,{
method:"POST"
});
}catch(e){}

document.getElementById("chatBox").innerHTML=`
<div class="flex gap-3">
<div class="bg-blue-600 text-white p-2 rounded-lg">🤖</div>
<div class="bg-white shadow rounded-xl p-4 max-w-xl">
New conversation started. Upload a PDF to continue.
</div>
</div>`;

resetUpload();

}

</script>

</body>
</html>
